
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEYKO CRYPTO</title>
    <style>
        body { margin: 0; background: #0a192f; color: white; font-family: sans-serif; }
        .page { display: none; padding: 20px; padding-bottom: 80px; }
        .active { display: block; }
        .card { background: #112240; padding: 20px; border-radius: 12px; border: 1px solid #d4af37; margin-bottom: 15px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0a192f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #d4af37; }
        .tab { color: #d4af37; cursor: pointer; text-align: center; font-size: 12px; }
        .btn { background: #d4af37; color: black; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="home" class="page active">
    <h3>📊 Dashboard</h3>
    <div class="card" id="chart-container" style="height:300px;">
        </div>
</div>

<div id="signals" class="page">
    <h3>🚀 Signaux VIP</h3>
    <div class="card">
        <p>1. BTC/USDT Long - Entry: 64k - TP: 66k</p>
        <p>2. ETH/USDT Short - Entry: 3.1k - TP: 2.9k</p>
    </div>
</div>

<div id="vip" class="page">
    <h3>💳 Accès VIP</h3>
    <div class="card">
        <p>Peman: 10$ USDT (TRC20)</p>
        <div style="background:#000; padding:10px; font-size:12px;">TUvxxxxxxxxxxxxxxxxxxxxxxxxxxx</div>
        <br>
        <div class="btn" onclick="alert('Tanpri voye screenshot la!')">J'ai payé</div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab" onclick="show('home')">📊<br>Dashboard</div>
    <div class="tab" onclick="show('signals')">🚀<br>Signaux</div>
    <div class="tab" onclick="show('vip')">💳<br>VIP</div>
</div>

<script>
    function show(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        // Lojik pou chaje/retire grafik la pou l pa lag
        if(pageId === 'home') {
            document.getElementById('chart-container').innerHTML = '<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE:BTCUSDT&theme=dark" width="100%" height="100%" frameborder="0"></iframe>';
        } else {
            document.getElementById('chart-container').innerHTML = ''; // Libere memwa
        }
    }
    show('home'); // Chaje dashboard an premye
</script>
</body>
</html>
