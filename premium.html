<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    text-align: center;
    padding: 30px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: gold;
    font-weight: bold;
    margin-top: 15px;
}
</style>

</head>

<body>

<h1>💎 Premium Plan</h1>

<div class="card">
    <h2>$10 / month</h2>

    <p>✔ Access to signals</p>
    <p>✔ Buy / Sell alerts</p>
    <p>✔ Priority updates</p>

    <button onclick="activatePremium()">Activate (Admin)</button>
</div>

<a href="index.html">
<button>⬅ Back</button>
</a>

<script>
function activatePremium(){
    localStorage.setItem("premium", "true");
    alert("Premium activated ✅");
}
</script>

</body>
</html>
