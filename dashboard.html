<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📊 Crypto Dashboard</h1>

<!-- PRICE CARDS -->
<div class="card">
    <h2>Bitcoin (BTC)</h2>
    <p id="btc">$ ---</p>
</div>

<div class="card">
    <h2>Ethereum (ETH)</h2>
    <p id="eth">$ ---</p>
</div>

<!-- BTC CHART -->
<div class="card">
    <h2>📈 BTC Chart</h2>

    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark"
        width="100%" 
        height="300" 
        frameborder="0">
    </iframe>

</div>

<!-- ETH CHART -->
<div class="card">
    <h2>📉 ETH Chart</h2>

    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=1&theme=dark"
        width="100%" 
        height="300" 
        frameborder="0">
    </iframe>

</div>

<!-- BACK BUTTON -->
<a href="index.html">
<button>⬅ Back</button>
</a>

<script src="script.js"></script>

</body>
</html>
