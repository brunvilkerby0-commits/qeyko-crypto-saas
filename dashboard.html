<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.top-signals {
    display: flex;
    justify-content: space-around;
    margin: 15px;
}

.signal {
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
}

.buy {
    background: rgba(0,255,100,0.1);
    color: lime;
}

.sell {
    background: rgba(255,0,0,0.1);
    color: red;
}

.card {
    background: #111827;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
}
</style>

</head>

<body>

<h1>📊 Crypto Dashboard</h1>

<!-- SIGNALS -->
<div class="top-signals">

    <div class="signal buy">
        BTC → <span id="btcSignal">---</span><br>
        <small id="premiumMsgBTC"></small>
    </div>

    <div class="signal sell">
        ETH → <span id="ethSignal">---</span><br>
        <small id="premiumMsgETH"></small>
    </div>

</div>

<!-- ADMIN PANEL -->
<div class="card">
    <h2>⚙️ Admin Signal Panel</h2>

    <p>Proposed BTC: <span id="btcProposed">---</span></p>

    <button onclick="generateSignal()">⚡ Generate</button>
    <button onclick="validateSignal()">✅ Validate</button>
</div>

<!-- PRICE -->
<div class="card">
    <h2>Bitcoin (BTC)</h2>
    <p>$ ---</p>
</div>

<div class="card">
    <h2>Ethereum (ETH)</h2>
    <p>$ ---</p>
</div>

<!-- BTC CHART -->
<div class="card">
    <h2>📈 BTC Chart</h2>
    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark"
        width="100%" height="300">
    </iframe>
</div>

<!-- ETH CHART -->
<div class="card">
    <h2>📉 ETH Chart</h2>
    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=1&theme=dark"
        width="100%" height="300">
    </iframe>
</div>

<button onclick="logout()">🚪 Logout</button>

<a href="index.html">
<button>⬅ Back</button>
</a>

<script src="script.js"></script>

<script>
// PREMIUM DISPLAY
let isPremium = localStorage.getItem("premium") === "true";

if(!isPremium){
    document.getElementById("btcSignal").innerText = "🔒 Locked";
    document.getElementById("ethSignal").innerText = "🔒 Locked";

    document.getElementById("premiumMsgBTC").innerText = "Premium only";
    document.getElementById("premiumMsgETH").innerText = "Premium only";
}
</script>

</body>
</html>
