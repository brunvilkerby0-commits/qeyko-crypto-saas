
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.top-signals {
    display: flex;
    justify-content: space-around;
    margin: 15px;
}

.signal {
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
}

.buy {
    background: rgba(0,255,100,0.1);
    color: lime;
}

.sell {
    background: rgba(255,0,0,0.1);
    color: red;
}
</style>

</head>

<body>

<h1>📊 Crypto Dashboard</h1>

<!-- GLOBAL SIGNALS -->
<div class="top-signals">
    <div class="signal buy">BTC → <span id="btcSignal">---</span></div>
    <div class="signal sell">ETH → <span id="ethSignal">---</span></div>
</div>

<!-- ADMIN PANEL -->
<div class="card">
    <h2>⚙️ Admin Signal Panel</h2>

    <p>Proposed BTC: <span id="btcProposed">---</span></p>

    <button onclick="generateSignal()">⚡ Generate</button>
    <button onclick="validateSignal()">✅ Validate</button>
</div>

<!-- PRICE -->
<div class="card">
    <h2>Bitcoin (BTC)</h2>
    <p id="btc">$ ---</p>
</div>

<div class="card">
    <h2>Ethereum (ETH)</h2>
    <p id="eth">$ ---</p>
</div>

<!-- BTC CHART -->
<div class="card">
    <h2>📈 BTC Chart</h2>

    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=1&theme=dark"
        width="100%" 
        height="300">
    </iframe>

</div>

<!-- ETH CHART -->
<div class="card">
    <h2>📉 ETH Chart</h2>

    <iframe 
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=1&theme=dark"
        width="100%" 
        height="300">
    </iframe>

</div>

<a href="index.html">
<button>⬅ Back</button>
</a>

<script src="script.js"></script>

</body>
</html>
