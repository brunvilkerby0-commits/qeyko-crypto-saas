<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* CENTER LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 90%;
    max-width: 300px;
    background: #111827;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px 0;
}

/* BUTTON */
button {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="login-container">

    <div class="login-box">
        <h2>🔐 Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
    </div>

</div>

<script src="script.js"></script>

<script>
// si deja login → ale index
if(localStorage.getItem("logged") === "true"){
    window.location.href = "index.html";
}
</script>

</body>
</html>
